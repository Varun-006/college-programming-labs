//1a. Write a script that Logs "Hello, World!" to the console. Create a script that calculates 
the sum of two numbers and displays the result in an alert box.
<!DOCTYPE html>
<html>

<head>
<title>Dynamic Input Experiment</title>
</head>

<body>

<script>

// Q1aa: Write a script that logs "Hello, World!" to the console.
console.log("Hello, World!");


// Q1aa: Write a script that reads two numbers from user input 
// and displays their sum using an alert box.

// Read numbers from user input
let num1 = parseFloat(prompt("Enter the first number:"));
let num2 = parseFloat(prompt("Enter the second number:"));

// Calculate sum
let sum = num1 + num2;

// Display result
alert("The sum is: " + sum);

</script>

</body>
</html>
